# Required GitHub Secrets:
# KEYSTORE_BASE64 - Base64-encoded release keystore
# KEYSTORE_PASSWORD - Keystore password
# KEY_ALIAS - Signing key alias
# KEY_PASSWORD - Signing key password
# GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - Play Console API service account JSON
# FIREBASE_SERVICE_ACCOUNT - Firebase Hosting deploy service account

name: Android Release

concurrency:
  group: android-release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - beta
          - production

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run unit tests
        run: npx vitest run
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Append version to gradle.properties
        run: |
          echo "" >> android/app/gradle.properties
          echo "APP_VERSION_NAME=${{ steps.version.outputs.version }}" >> android/app/gradle.properties
          echo "APP_VERSION_CODE=${{ github.run_number }}" >> android/app/gradle.properties
      - name: Build web
        run: npm run build
      - name: Capacitor sync
        run: npx cap sync android
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
      - name: Build signed AAB
        working-directory: android
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: co.picklescore.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6db9e3549f3b159c032711f2b95a9 # v4
        with:
          name: android-aab-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/release.keystore
