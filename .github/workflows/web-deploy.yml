name: Web Deploy

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
      - name: Validate assetlinks.json
        run: |
          node -e "
            const fs = require('fs');
            const f = JSON.parse(fs.readFileSync('dist/.well-known/assetlinks.json', 'utf8'));
            const entry = f.find(e => e.target.package_name === 'co.picklescore.app');
            if (!entry) { console.error('Package not found in assetlinks.json'); process.exit(1); }
            console.log('assetlinks.json OK: package_name =', entry.target.package_name);
          "
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@0cbcac4740c2bfb00d632f0b863b57713124eb5a # v0.9.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: picklescore-b0a71
