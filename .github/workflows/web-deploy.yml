name: Web Deploy

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run unit tests
        run: npx vitest run
      - name: Build
        run: npm run build
      - name: Validate assetlinks.json
        run: |
          node -e "
            const fs = require('fs');
            const f = JSON.parse(fs.readFileSync('dist/.well-known/assetlinks.json', 'utf8'));
            const entry = f.find(e => e.target.package_name === 'co.picklescore.app');
            if (!entry) { console.error('Package not found in assetlinks.json'); process.exit(1); }
            console.log('assetlinks.json OK: package_name =', entry.target.package_name);
          "
      - name: Update deploy manifest
        run: |
          echo '{"version":"1.0.0","commit":"'"${{ github.sha }}"'","deployed":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' > dist/deploy.json
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: picklescore-b0a71
      - name: Verify deploy manifest
        if: success()
        run: |
          sleep 10
          MANIFEST=$(curl -sf "https://picklescore.co/deploy.json" || echo '{}')
          DEPLOYED_COMMIT=$(echo "$MANIFEST" | jq -r '.commit // empty')
          if [ "$DEPLOYED_COMMIT" != "${{ github.sha }}" ]; then
            echo "::warning::Deploy manifest commit mismatch: expected ${{ github.sha }}, got $DEPLOYED_COMMIT"
          fi
      - name: Verify no source maps in build
        if: success()
        run: |
          if grep -r 'sourceMappingURL=.*\.map' dist/assets/*.js 2>/dev/null; then
            echo "::error::Source maps detected in production bundles!"
            exit 1
          fi
